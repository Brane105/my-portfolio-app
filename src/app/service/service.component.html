<section id="services" class="section services">
  <div class="container">
    <div class="section-heading">
      <p class="section-label">SERVICES</p>
      <h2>Full-stack delivery for polished, practical web products.</h2>
      <p>
        From frontend interfaces to backend APIs and cloud deployment, I help teams move from idea to dependable software
        with a calm engineering process.
      </p>
    </div>

    <div class="service-grid" @serviceList>
      <article class="service-card reveal-item" #serviceCard *ngFor="let service of services">
        <span class="icon-frame">
          <i class="ti" [ngClass]="service.icon" aria-hidden="true"></i>
        </span>
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
      </article>
    </div>
  </div>
</section>
