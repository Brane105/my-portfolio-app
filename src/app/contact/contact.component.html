<section id="contact" class="section contact">
  <div class="contact-pattern" aria-hidden="true"></div>
  <div class="container">
    <div class="section-heading">
      <p class="section-label">CONTACT</p>
      <h2>Let's build something worth shipping.</h2>
    </div>

    <div class="contact-grid">
      <aside class="contact-info" aria-label="Contact information">
        <a
          class="contact-card"
          *ngFor="let item of contactLinks"
          [href]="item.href"
          target="_blank"
          rel="noreferrer"
        >
          <span class="icon-frame">
            <i class="ti" [ngClass]="item.icon" aria-hidden="true"></i>
          </span>
          <span>
            <small>{{ item.label }}</small>
            <strong>{{ item.value }}</strong>
          </span>
        </a>
      </aside>

      <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="sendMessage()" novalidate>
        <div class="field-grid">
          <label>
            <span>Name</span>
            <input type="text" formControlName="name" autocomplete="name" placeholder="Your name">
            <small *ngIf="hasError('name')">Please enter your name.</small>
          </label>

          <label>
            <span>Email</span>
            <input type="email" formControlName="email" autocomplete="email" placeholder="you@example.com">
            <small *ngIf="hasError('email')">Please enter a valid email.</small>
          </label>
        </div>

        <label>
          <span>Subject</span>
          <input type="text" formControlName="subject" placeholder="Project or collaboration">
          <small *ngIf="hasError('subject')">Please add a subject.</small>
        </label>

        <label>
          <span>Message</span>
          <textarea formControlName="message" rows="6" placeholder="Tell me what you want to build"></textarea>
          <small *ngIf="hasError('message')">Please share a few more details.</small>
        </label>

        <button class="btn btn-dark" type="submit">Send Message</button>

        <div class="success-message" *ngIf="sent" @successPop>
          <i class="ti ti-circle-check" aria-hidden="true"></i>
          Message ready. I will get back to you soon.
        </div>
      </form>
    </div>
  </div>
</section>
