<section id="portfolio" class="section portfolio">
  <div class="container">
    <div class="portfolio-heading">
      <div class="section-heading">
        <p class="section-label">PORTFOLIO</p>
        <h2>Things I have built.</h2>
      </div>

    </div>

    <div class="project-grid" [@projectGrid]="filteredProjects().length">
      <article
        class="project-card"
        *ngFor="let project of filteredProjects(); trackBy: trackProject"
        [style.--project-color]="project.color"
      >
        <div class="card-image">
          <img [src]="project.image" [alt]="project.title" loading="lazy" />
        </div>

        <div class="project-body">
          <span class="project-category">{{ project.category }}</span>
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>

          <div class="stack-list">
            <span *ngFor="let tech of project.stack">{{ tech }}</span>
          </div>
        </div>

        <footer class="project-footer">
          <a class="btn btn-project" [href]="project.url" target="_blank" rel="noreferrer" [attr.aria-label]="'View project ' + project.title">View Project</a>
          <a class="project-icon-link" href="https://github.com/Brane105" target="_blank" rel="noreferrer" aria-label="GitHub">
            <i class="ti ti-brand-github" aria-hidden="true"></i>
          </a>
        </footer>
      </article>
    </div>
  </div>
</section>
