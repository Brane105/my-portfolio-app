<header class="site-header" [class.is-scrolled]="scrolled">
  <div class="container nav-shell">
    <a class="brand" routerLink="/home" (click)="closeMenu()" aria-label="Bhalchandra Rane home">
      <span class="brand-mark">BR</span>
      <span class="brand-copy">
        <strong>Bhalchandra Rane</strong>
        <small>Full Stack Software Engineer</small>
      </span>
    </a>

    <nav class="nav-menu" [class.is-open]="menuOpen" aria-label="Primary navigation">
      <a
        *ngFor="let item of navItems"
        class="nav-link"
        [routerLink]="item.route"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        <i class="ti" [ngClass]="item.icon" aria-hidden="true"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="nav-actions">
      <button class="icon-btn theme-toggle" type="button" (click)="toggleTheme()" [attr.aria-label]="darkMode ? 'Use light mode' : 'Use dark mode'">
        <i class="ti" [ngClass]="darkMode ? 'ti-sun' : 'ti-moon'" aria-hidden="true"></i>
      </button>
      <a class="btn btn-dark nav-cta" routerLink="/contact">Hire Me</a>
      <button class="icon-btn menu-toggle" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle menu">
        <i class="ti" [ngClass]="menuOpen ? 'ti-x' : 'ti-menu-2'" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</header>
