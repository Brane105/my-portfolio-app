<header class="header">
  <div class="container header-shell">
    <a routerLink="/home" class="brand" aria-label="Bhalchandra Rane home">
      <span class="brand-mark">BR</span>
      <span>
        <strong>Bhalchandra Rane</strong>
        <small>Full Stack Software Engineer</small>
      </span>
    </a>

    <nav class="navbar" [ngClass]="status ? 'active' : ''" aria-label="Primary navigation">
      <ul class="navbar-list">
        <li>
          <a routerLink="/home" class="navbar-link" routerLinkActive="active" (click)="closeMenu()">
            <ion-icon name="home-outline" aria-hidden="true"></ion-icon>
            <span>Home</span>
          </a>
        </li>
        <li>
          <a routerLink="/service" class="navbar-link" routerLinkActive="active" (click)="closeMenu()">
            <ion-icon name="construct-outline" aria-hidden="true"></ion-icon>
            <span>Services</span>
          </a>
        </li>
        <li>
          <a routerLink="/portfolio" class="navbar-link" routerLinkActive="active" (click)="closeMenu()">
            <ion-icon name="briefcase-outline" aria-hidden="true"></ion-icon>
            <span>Portfolio</span>
          </a>
        </li>
        <li>
          <a routerLink="/contact" class="navbar-link" routerLinkActive="active" (click)="closeMenu()">
            <ion-icon name="mail-outline" aria-hidden="true"></ion-icon>
            <span>Contact</span>
          </a>
        </li>
      </ul>
    </nav>

    <a routerLink="/contact" class="btn btn-primary header-cta">Hire Me</a>

    <button class="nav-toggle-btn" aria-label="Toggle menu" [attr.aria-expanded]="status" (click)="addToggle()">
      <ion-icon [name]="status ? 'close-outline' : 'menu-outline'" aria-hidden="true"></ion-icon>
    </button>
  </div>
</header>
